name: Simple iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      
      - name: Remove localization generation
        run: |
          rm -f .dart_tool/flutter_gen/gen_l10n.dart
          rm -rf lib/l10n/generated/
      
      - name: Build iOS
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign --no-tree-shake-icons
      
      - uses: actions/upload-artifact@v4
        with:
          name: commet-ipa
          path: build/ios/ipa/*.ipa
