name: Simple iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - Show current directory and files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Checking for lib/main.dart:"
          ls -la lib/ 2>/dev/null || echo "lib/ folder not found!"
          echo "Checking pubspec.yaml:"
          cat pubspec.yaml | head -5
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      
      - name: Build iOS
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign
      
      - uses: actions/upload-artifact@v4
        with:
          name: commet-ipa
          path: build/ios/ipa/*.ipa
